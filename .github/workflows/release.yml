name: Release

on:
  push:
    branches:
      - release
      - release/**

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"

          if [[ "$branch" == "release" ]]; then
            version="release-${GITHUB_RUN_NUMBER}"
          else
            version="${branch#release/}"
            version="${version//\//-}"
          fi

          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "name=Diesel Templater ${version}" >> "$GITHUB_OUTPUT"

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts/package

          cp diesel.py release-artifacts/diesel.py
          cp diesel.py release-artifacts/package/diesel.py
          cp -R example release-artifacts/package/example

          cd release-artifacts/package
          zip -r ../diesel-templater-with-example.zip diesel.py example

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.name }}
        shell: bash
        run: |
          gh release create "$TAG_NAME" \
            release-artifacts/diesel.py \
            release-artifacts/diesel-templater-with-example.zip \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "Release generated from $GITHUB_REF_NAME at $GITHUB_SHA."
