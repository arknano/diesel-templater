<!DOCTYPE html>
<html>

<head>
    %style%
    <title>Diesel Templater</title>
</head>

<body>
    %header%
    <main>
        <section>
            <h2>A tiny example site</h2>
            <img class="hero-image" src="images/site-preview.png" alt="A simple website preview">
            <p>
                This page uses shared template snippets for the header and styles.
                Edit the files in <code>site/templates</code> to update every page that includes them.
            </p>
            <p>
                The nested page reuses the same templates from <code>site/pages/nested.html</code>.
            </p>
        </section>
    </main>
</body>

</html>
